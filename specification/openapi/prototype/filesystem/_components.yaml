components:
  schemas:
    Body_upload:
      properties:
        file:
          type: string
          format: binary
          title: File
          description: File to be uploaded as `multipart/form-data`
      type: object
      required:
      - file
      title: Body_upload
    CompressionType:
      type: string
      enum:
      - none
      - bzip2
      - gzip
      - xz
      title: CompressionType
      description: Defines the type of compression to be used for compressing or extracting
        files.
    PostCompressRequest:
      properties:
        path:
          anyOf:
          - type: string
          - type: 'null'
          title: Path
          description: Source file or directory path
          example: /home/user/dir
        target_path:
          type: string
          title: Target Path
          description: Path to the compressed file
          example: /home/user/file.tar.gz
        match_pattern:
          anyOf:
          - type: string
          - type: 'null'
          title: Match Pattern
          description: Regex pattern to filter files to compress
          example: .*\.txt$
        dereference:
          type: boolean
          title: Dereference
          description: If set to `true`, it follows symbolic links and archive the
            files they point to instead of the links themselves.
          default: false
          example: true
        compression:
          $ref: '#/components/schemas/CompressionType'
          description: Defines the type of compression to be used. By default gzip
            is used.
          default: gzip
          example: gzip
      type: object
      required:
      - target_path
      title: PostCompressRequest
      description: Represents a request to compress a file.
      examples:
      - compression: none
        dereference: 'true'
        match_pattern: '*./[ab].*\.txt'
        source_path: /home/user/dir
        target_path: /home/user/file.tar.gz
    PostCopyRequest:
      properties:
        path:
          anyOf:
          - type: string
          - type: 'null'
          title: Path
          description: Source file or directory path
          example: /home/user/dir
        target_path:
          type: string
          title: Target Path
          description: Target path of the copy operation
          example: /home/user/dir/file.new
        dereference:
          type: boolean
          title: Dereference
          description: If set to `true`, it follows symbolic links and copies the
            files they point to instead of the links themselves.
          default: false
          example: true
      type: object
      required:
      - target_path
      title: PostCopyRequest
      description: Represents a request to copy a file.
      examples:
      - dereference: 'true'
        source_path: /home/user/dir/file.orig
        target_path: /home/user/dir/file.new
    PostExtractRequest:
      properties:
        path:
          anyOf:
          - type: string
          - type: 'null'
          title: Path
          description: Source file or directory path
          example: /home/user/dir
        target_path:
          type: string
          title: Target Path
          description: Path to the directory where to extract the compressed file
          example: /home/user/dir
        compression:
          $ref: '#/components/schemas/CompressionType'
          description: Defines the type of compression to be used. By default gzip
            is used.
          default: gzip
          example: gzip
      type: object
      required:
      - target_path
      title: PostExtractRequest
      description: Represents a request to extract a compressed file.
      examples:
      - compression: none
        source_path: /home/user/dir/file.tar.gz
        target_path: /home/user/dir
    PostFileSymlinkRequest:
      properties:
        path:
          anyOf:
          - type: string
          - type: 'null'
          title: Path
          description: Source file or directory path
          example: /home/user/dir
        link_path:
          type: string
          title: Link Path
          description: Path to the new symlink
          example: /home/user/newlink
      type: object
      required:
      - link_path
      title: PostFileSymlinkRequest
      description: Represents a request to create a symbolic link.
      examples:
      - link_path: /home/user/newlink
        path: /home/user/dir
    PostMakeDirRequest:
      properties:
        path:
          anyOf:
          - type: string
          - type: 'null'
          title: Path
          description: Source file or directory path
          example: /home/user/dir
        parent:
          type: boolean
          title: Parent
          description: If set to `true` creates all its parent directories if they
            do not already exist
          default: false
          example: true
      type: object
      title: PostMakeDirRequest
      description: Represents a request to create a directory.
      examples:
      - parent: 'true'
        path: /home/user/dir/newdir
    PostMoveRequest:
      properties:
        path:
          anyOf:
          - type: string
          - type: 'null'
          title: Path
          description: Source file or directory path
          example: /home/user/dir
        target_path:
          type: string
          title: Target Path
          description: Target path of the move operation
          example: /home/user/dir/file.new
      type: object
      required:
      - target_path
      title: PostMoveRequest
      description: Represents a request to move a file.
      examples:
      - source_path: /home/user/dir/file.orig
        target_path: /home/user/dir/file.new
    PutFileChmodRequest:
      properties:
        path:
          anyOf:
          - type: string
          - type: 'null'
          title: Path
          description: Source file or directory path
          example: /home/user/dir
        mode:
          type: string
          title: Mode
          description: Mode in octal permission format
          example: '777'
      type: object
      required:
      - mode
      title: PutFileChmodRequest
      description: Represents a request to change file permissions.
      examples:
      - mode: '777'
        path: /home/user/dir/file.out
    PutFileChownRequest:
      properties:
        path:
          anyOf:
          - type: string
          - type: 'null'
          title: Path
          description: Source file or directory path
          example: /home/user/dir
        owner:
          type: string
          title: Owner
          description: User name of the new user owner of the file
          default: ''
          example: user
        group:
          type: string
          title: Group
          description: Group name of the new group owner of the file
          default: ''
          example: my-group
      type: object
      title: PutFileChownRequest
      description: Represents a request to change file ownership.
      examples:
      - group: my-group
        owner: user
        path: /home/user/dir/file.out
    Task:
      properties:
        id:
          type: string
          title: Id
          description: Unique identifier of the task
          example: task-123
        status:
          $ref: '#/components/schemas/TaskStatus'
          description: Current status of the task
          default: pending
          example: pending
        result:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Result
          description: Result of the task execution, if available
        command:
          anyOf:
          - $ref: '#/components/schemas/TaskCommand'
          - type: 'null'
          description: Command associated with this task
      type: object
      required:
      - id
      title: Task
      description: Represents a task in the system.
    TaskCommand:
      properties:
        router:
          type: string
          title: Router
          description: Router name the task comes from
          example: filesystem
        command:
          type: string
          title: Command
          description: Command to execute
          example: chmod
        args:
          additionalProperties: true
          type: object
          title: Args
          description: Command arguments as key-value pairs
          example:
            mode: '755'
            path: /home/user/file
      type: object
      required:
      - router
      - command
      - args
      title: TaskCommand
      description: Represents a command to be executed as part of a task.
    TaskStatus:
      type: string
      enum:
      - pending
      - active
      - completed
      - failed
      - canceled
      title: TaskStatus
      description: Represents the status of a task.
    TaskSubmitResponse:
      properties:
        task_id:
          type: string
          title: Task Id
          description: Identifier of the submitted task
          example: task-123
        task_uri:
          type: string
          title: Task Uri
          description: The list of past events in this incident
          readOnly: true
      type: object
      required:
      - task_id
      - task_uri
      title: TaskSubmitResponse
      description: Response model for submitting a task
