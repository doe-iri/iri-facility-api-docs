components:
  schemas:
    AllocationEntry:
      properties:
        allocation:
          type: number
          title: Allocation
          description: Total allocation amount granted.
          example: 100000.0
        usage:
          type: number
          title: Usage
          description: Amount of allocation consumed.
          example: 52342.5
        unit:
          $ref: '#/components/schemas/AllocationUnit'
          description: Unit of the allocation (e.g., node_hours, bytes).
          example: node_hours
      additionalProperties: true
      type: object
      required:
      - allocation
      - usage
      - unit
      title: AllocationEntry
      description: Base class for allocations.
    AllocationUnit:
      type: string
      enum:
      - node_hours
      - bytes
      - inodes
      title: AllocationUnit
      description: Units for allocation
    Body_upload:
      properties:
        file:
          type: string
          format: binary
          title: File
          description: File to be uploaded as `multipart/form-data`
      type: object
      required:
      - file
      title: Body_upload
    Capability:
      properties:
        id:
          type: string
          title: Id
          description: The unique identifier for the object. Typically a UUID or URN.
          example: urn:iri:object:1234
        name:
          anyOf:
          - type: string
          - type: 'null'
          title: Name
          description: The long name of the object.
          example: Perlmutter GPU
        description:
          anyOf:
          - type: string
          - type: 'null'
          title: Description
          description: Human-readable description of the object.
          example: High-performance GPU compute resource
        last_modified:
          anyOf:
          - type: string
            format: date-time
            description: Strict ISO8601 datetime. Only valid ISO8601 datetime strings
              are accepted.
            example: '2026-02-21T12:00:00Z'
          - type: 'null'
          title: Last Modified
          description: ISO 8601 timestamp when this object was last modified.
          example: '2026-02-21T12:00:00Z'
        units:
          items:
            $ref: '#/components/schemas/AllocationUnit'
          type: array
          title: Units
          description: Allocation units supported by this capability
          example:
          - node_hours
        self_uri:
          type: string
          title: Self Uri
          description: The canonical URL of this object
          readOnly: true
      additionalProperties: true
      type: object
      required:
      - id
      - units
      - self_uri
      title: Capability
      description: 'An aspect of a resource that can have an allocation.

        For example, Perlmutter nodes with GPUs

        For some resources at a facility, this will be 1 to 1 with the resource.

        It is a way to further subdivide a resource into allocatable sub-resources.

        The word "capability" is also known to users as something they need for a
        job to run. (eg. gpu)'
    CompressionType:
      type: string
      enum:
      - none
      - bzip2
      - gzip
      - xz
      title: CompressionType
      description: Defines the type of compression to be used for compressing or extracting
        files.
    Container:
      properties:
        image:
          type: string
          minLength: 1
          title: Image
          description: The container image to use (e.g., 'docker.io/library/ubuntu:latest')
          example: docker.io/library/ubuntu:latest
        volume_mounts:
          items:
            $ref: '#/components/schemas/VolumeMount'
          type: array
          title: Volume Mounts
          description: List of volume mounts for the container
      additionalProperties: true
      type: object
      required:
      - image
      title: Container
      description: 'Represents a container specification for job execution.


        Implementation notes: The value of gpu_cores_per_process in ResourceSpec should
        be used to determine

        if the container should be run with GPU support. Likewise, the value of launcher
        in JobSpec should be used

        to determine if the container should be run with MPI support. The container
        should by default. be run with

        host networking.'
    Event:
      properties:
        id:
          type: string
          title: Id
          description: The unique identifier for the object. Typically a UUID or URN.
          example: urn:iri:object:1234
        name:
          anyOf:
          - type: string
          - type: 'null'
          title: Name
          description: The long name of the object.
          example: Perlmutter GPU
        description:
          anyOf:
          - type: string
          - type: 'null'
          title: Description
          description: Human-readable description of the object.
          example: High-performance GPU compute resource
        last_modified:
          type: string
          format: date-time
          title: Last Modified
          description: ISO 8601 timestamp when this object was last modified.
          example: '2026-02-21T12:00:00Z'
        occurred_at:
          type: string
          format: date-time
          title: Occurred At
          description: Timestamp when the event occurred
          example: '2026-02-21T12:00:00Z'
        status:
          $ref: '#/components/schemas/Status'
          description: Status of the resource at the time of the event
          example: down
        self_uri:
          type: string
          title: Self Uri
          description: The canonical URL of this object
          readOnly: true
        resource_uri:
          type: string
          title: Resource Uri
          description: The resource belonging to this event
          readOnly: true
        incident_uri:
          anyOf:
          - type: string
          - type: 'null'
          title: Incident Uri
          description: The event's incident
          readOnly: true
      additionalProperties: true
      type: object
      required:
      - id
      - last_modified
      - occurred_at
      - status
      - self_uri
      - resource_uri
      - incident_uri
      title: Event
      description: Represents an event that occurred to a resource, which may be part
        of an incident.
    Facility:
      properties:
        id:
          type: string
          title: Id
          description: The unique identifier for the object. Typically a UUID or URN.
          example: urn:iri:object:1234
        name:
          anyOf:
          - type: string
          - type: 'null'
          title: Name
          description: The long name of the object.
          example: Perlmutter GPU
        description:
          anyOf:
          - type: string
          - type: 'null'
          title: Description
          description: Human-readable description of the object.
          example: High-performance GPU compute resource
        last_modified:
          type: string
          format: date-time
          title: Last Modified
          description: ISO 8601 timestamp when this object was last modified.
          example: '2026-02-21T12:00:00Z'
        short_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Short Name
          description: Common or short name of the Facility.
          example: ESnet
        organization_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Organization Name
          description: Operating organization's name.
          example: Energy Sciences Network
        support_uri:
          anyOf:
          - type: string
            maxLength: 2083
            minLength: 1
            format: uri
          - type: 'null'
          title: Support Uri
          description: Link to facility support portal.
          example: https://support.es.net
        self_uri:
          type: string
          title: Self Uri
          description: The canonical URL of this object
          readOnly: true
        site_uris:
          items:
            type: string
          type: array
          title: Site Uris
          description: URIs of associated Sites.
          readOnly: true
      additionalProperties: true
      type: object
      required:
      - id
      - last_modified
      - self_uri
      - site_uris
      title: Facility
      description: Facility representation, including associated Sites.
    Incident:
      properties:
        id:
          type: string
          title: Id
          description: The unique identifier for the object. Typically a UUID or URN.
          example: urn:iri:object:1234
        name:
          anyOf:
          - type: string
          - type: 'null'
          title: Name
          description: The long name of the object.
          example: Perlmutter GPU
        description:
          anyOf:
          - type: string
          - type: 'null'
          title: Description
          description: Human-readable description of the object.
          example: High-performance GPU compute resource
        last_modified:
          type: string
          format: date-time
          title: Last Modified
          description: ISO 8601 timestamp when this object was last modified.
          example: '2026-02-21T12:00:00Z'
        status:
          $ref: '#/components/schemas/Status'
          description: Current status of the incident
          example: degraded
        start:
          type: string
          format: date-time
          title: Start
          description: Incident start time
          example: '2026-02-21T12:00:00Z'
        end:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: End
          description: Incident end time
          example: '2026-02-21T14:00:00Z'
        type:
          $ref: '#/components/schemas/IncidentType'
          description: Type of incident
          example: planned
        resolution:
          $ref: '#/components/schemas/Resolution'
          description: Resolution status of the incident
          example: pending
        self_uri:
          type: string
          title: Self Uri
          description: The canonical URL of this object
          readOnly: true
        event_uris:
          items:
            type: string
          type: array
          title: Event Uris
          description: The list of past events in this incident
          readOnly: true
        resource_uris:
          items:
            type: string
          type: array
          title: Resource Uris
          description: The list of resources that may be impacted by this incident
          readOnly: true
      additionalProperties: true
      type: object
      required:
      - id
      - last_modified
      - status
      - start
      - type
      - resolution
      - self_uri
      - event_uris
      - resource_uris
      title: Incident
      description: Represents an incident that may impact one or more resources.
    IncidentType:
      type: string
      enum:
      - planned
      - unplanned
      - reservation
      title: IncidentType
      description: Represents the type of an incident.
    Job:
      properties:
        id:
          type: string
          title: Id
          description: Unique identifier of the job
          example: job-12345
        status:
          anyOf:
          - $ref: '#/components/schemas/JobStatus'
          - type: 'null'
          description: Current status of the job
        job_spec:
          anyOf:
          - $ref: '#/components/schemas/JobSpec-Output'
          - type: 'null'
          description: Specification used to create the job
      additionalProperties: true
      type: object
      required:
      - id
      title: Job
      description: Represents a job in the system.
    JobAttributes:
      properties:
        duration:
          anyOf:
          - type: integer
            minimum: 1.0
          - type: 'null'
          title: Duration
          description: Duration in seconds
          examples:
          - 30
          - 60
          - 120
        queue_name:
          anyOf:
          - type: string
            minLength: 1
          - type: 'null'
          title: Queue Name
          description: Name of the queue or partition to submit the job to
          example: debug
        account:
          anyOf:
          - type: string
            minLength: 1
          - type: 'null'
          title: Account
          description: Account or project to charge for resource usage
          example: proj123
        reservation_id:
          anyOf:
          - type: string
            minLength: 1
          - type: 'null'
          title: Reservation Id
          description: ID of a reservation to use for the job
          example: resv-42
        custom_attributes:
          additionalProperties:
            type: string
          type: object
          title: Custom Attributes
          description: Custom scheduler-specific attributes as key-value pairs
          example:
            constraint: gpu
      additionalProperties: true
      type: object
      title: JobAttributes
      description: Additional attributes and scheduling parameters for a job.
    JobSpec-Input:
      properties:
        executable:
          anyOf:
          - type: string
            minLength: 1
          - type: 'null'
          title: Executable
          description: Path to the executable to run. If container is specified, this
            will be used as the entrypoint to the container.
          example: /usr/bin/python
        container:
          anyOf:
          - $ref: '#/components/schemas/Container'
          - type: 'null'
          description: Container specification for containerized execution
        arguments:
          items:
            type: string
          type: array
          title: Arguments
          description: Command-line arguments to pass to the executable or container
          example:
          - -n
          - '100'
        directory:
          anyOf:
          - type: string
            minLength: 1
          - type: 'null'
          title: Directory
          description: Working directory for the job
          example: /home/user/work
        name:
          anyOf:
          - type: string
            minLength: 1
          - type: 'null'
          title: Name
          description: Name of the job
          example: my-job
        inherit_environment:
          type: boolean
          title: Inherit Environment
          description: Whether to inherit the environment variables from the submission
            environment
          default: true
          example: true
        environment:
          additionalProperties:
            type: string
          type: object
          title: Environment
          description: Environment variables to set for the job. If container is specified,
            these will be set inside the container.
          example:
            OMP_NUM_THREADS: '4'
        stdin_path:
          anyOf:
          - type: string
            minLength: 1
          - type: 'null'
          title: Stdin Path
          description: Path to file to use as standard input
          example: /home/user/input.txt
        stdout_path:
          anyOf:
          - type: string
            minLength: 1
          - type: 'null'
          title: Stdout Path
          description: Path to file to write standard output
          example: /home/user/output.txt
        stderr_path:
          anyOf:
          - type: string
            minLength: 1
          - type: 'null'
          title: Stderr Path
          description: Path to file to write standard error
          example: /home/user/error.txt
        resources:
          anyOf:
          - $ref: '#/components/schemas/ResourceSpec'
          - type: 'null'
          description: Resource requirements for the job
        attributes:
          anyOf:
          - $ref: '#/components/schemas/JobAttributes'
          - type: 'null'
          description: Additional job attributes such as duration, queue, and account
        pre_launch:
          anyOf:
          - type: string
            minLength: 1
          - type: 'null'
          title: Pre Launch
          description: Script or commands to run before launching the job
          example: module load cuda
        post_launch:
          anyOf:
          - type: string
            minLength: 1
          - type: 'null'
          title: Post Launch
          description: Script or commands to run after the job completes
          example: echo done
        launcher:
          anyOf:
          - type: string
            minLength: 1
          - type: 'null'
          title: Launcher
          description: Job launcher to use (e.g., 'mpirun', 'srun')
          example: srun
      additionalProperties: false
      type: object
      title: JobSpec
      description: Specification for a job.
    JobSpec-Output:
      properties:
        executable:
          anyOf:
          - type: string
            minLength: 1
          - type: 'null'
          title: Executable
          description: Path to the executable to run. If container is specified, this
            will be used as the entrypoint to the container.
          example: /usr/bin/python
        container:
          anyOf:
          - $ref: '#/components/schemas/Container'
          - type: 'null'
          description: Container specification for containerized execution
        arguments:
          items:
            type: string
          type: array
          title: Arguments
          description: Command-line arguments to pass to the executable or container
          example:
          - -n
          - '100'
        directory:
          anyOf:
          - type: string
            minLength: 1
          - type: 'null'
          title: Directory
          description: Working directory for the job
          example: /home/user/work
        name:
          anyOf:
          - type: string
            minLength: 1
          - type: 'null'
          title: Name
          description: Name of the job
          example: my-job
        inherit_environment:
          type: boolean
          title: Inherit Environment
          description: Whether to inherit the environment variables from the submission
            environment
          default: true
          example: true
        environment:
          additionalProperties:
            type: string
          type: object
          title: Environment
          description: Environment variables to set for the job. If container is specified,
            these will be set inside the container.
          example:
            OMP_NUM_THREADS: '4'
        stdin_path:
          anyOf:
          - type: string
            minLength: 1
          - type: 'null'
          title: Stdin Path
          description: Path to file to use as standard input
          example: /home/user/input.txt
        stdout_path:
          anyOf:
          - type: string
            minLength: 1
          - type: 'null'
          title: Stdout Path
          description: Path to file to write standard output
          example: /home/user/output.txt
        stderr_path:
          anyOf:
          - type: string
            minLength: 1
          - type: 'null'
          title: Stderr Path
          description: Path to file to write standard error
          example: /home/user/error.txt
        resources:
          anyOf:
          - $ref: '#/components/schemas/ResourceSpec'
          - type: 'null'
          description: Resource requirements for the job
        attributes:
          anyOf:
          - $ref: '#/components/schemas/JobAttributes'
          - type: 'null'
          description: Additional job attributes such as duration, queue, and account
        pre_launch:
          anyOf:
          - type: string
            minLength: 1
          - type: 'null'
          title: Pre Launch
          description: Script or commands to run before launching the job
          example: module load cuda
        post_launch:
          anyOf:
          - type: string
            minLength: 1
          - type: 'null'
          title: Post Launch
          description: Script or commands to run after the job completes
          example: echo done
        launcher:
          anyOf:
          - type: string
            minLength: 1
          - type: 'null'
          title: Launcher
          description: Job launcher to use (e.g., 'mpirun', 'srun')
          example: srun
      additionalProperties: false
      type: object
      title: JobSpec
      description: Specification for a job.
    JobState:
      type: string
      enum:
      - new
      - queued
      - held
      - active
      - completed
      - failed
      - canceled
      title: JobState
      description: 'from: https://exaworks.org/psij-python/docs/v/0.9.11/_modules/psij/job_state.html#JobState


        An enumeration holding the possible job states.


        The possible states are: `NEW`, `QUEUED`, `ACTIVE`, `COMPLETED`, `FAILED`,
        and `CANCELED`.'
    JobStatus:
      properties:
        state:
          $ref: '#/components/schemas/JobState'
          description: Current state of the job
          example: queued
        time:
          anyOf:
          - type: number
          - type: 'null'
          title: Time
          description: Timestamp associated with the status (seconds since epoch)
          example: 1708531200.0
        message:
          anyOf:
          - type: string
          - type: 'null'
          title: Message
          description: Human-readable status message
          example: Job is waiting in queue
        exit_code:
          anyOf:
          - type: integer
          - type: 'null'
          title: Exit Code
          description: Process exit code if the job has finished
          example: 0
        meta_data:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Meta Data
          description: Backend-specific metadata associated with the job status
      additionalProperties: true
      type: object
      required:
      - state
      title: JobStatus
      description: Represents the status of a job.
    PostCompressRequest:
      properties:
        path:
          anyOf:
          - type: string
          - type: 'null'
          title: Path
          description: Source file or directory path
          example: /home/user/dir
        target_path:
          type: string
          title: Target Path
          description: Path to the compressed file
          example: /home/user/file.tar.gz
        match_pattern:
          anyOf:
          - type: string
          - type: 'null'
          title: Match Pattern
          description: Regex pattern to filter files to compress
          example: .*\.txt$
        dereference:
          type: boolean
          title: Dereference
          description: If set to `true`, it follows symbolic links and archive the
            files they point to instead of the links themselves.
          default: false
          example: true
        compression:
          $ref: '#/components/schemas/CompressionType'
          description: Defines the type of compression to be used. By default gzip
            is used.
          default: gzip
          example: gzip
      type: object
      required:
      - target_path
      title: PostCompressRequest
      description: Represents a request to compress a file.
      examples:
      - compression: none
        dereference: 'true'
        match_pattern: '*./[ab].*\.txt'
        source_path: /home/user/dir
        target_path: /home/user/file.tar.gz
    PostCopyRequest:
      properties:
        path:
          anyOf:
          - type: string
          - type: 'null'
          title: Path
          description: Source file or directory path
          example: /home/user/dir
        target_path:
          type: string
          title: Target Path
          description: Target path of the copy operation
          example: /home/user/dir/file.new
        dereference:
          type: boolean
          title: Dereference
          description: If set to `true`, it follows symbolic links and copies the
            files they point to instead of the links themselves.
          default: false
          example: true
      type: object
      required:
      - target_path
      title: PostCopyRequest
      description: Represents a request to copy a file.
      examples:
      - dereference: 'true'
        source_path: /home/user/dir/file.orig
        target_path: /home/user/dir/file.new
    PostExtractRequest:
      properties:
        path:
          anyOf:
          - type: string
          - type: 'null'
          title: Path
          description: Source file or directory path
          example: /home/user/dir
        target_path:
          type: string
          title: Target Path
          description: Path to the directory where to extract the compressed file
          example: /home/user/dir
        compression:
          $ref: '#/components/schemas/CompressionType'
          description: Defines the type of compression to be used. By default gzip
            is used.
          default: gzip
          example: gzip
      type: object
      required:
      - target_path
      title: PostExtractRequest
      description: Represents a request to extract a compressed file.
      examples:
      - compression: none
        source_path: /home/user/dir/file.tar.gz
        target_path: /home/user/dir
    PostFileSymlinkRequest:
      properties:
        path:
          anyOf:
          - type: string
          - type: 'null'
          title: Path
          description: Source file or directory path
          example: /home/user/dir
        link_path:
          type: string
          title: Link Path
          description: Path to the new symlink
          example: /home/user/newlink
      type: object
      required:
      - link_path
      title: PostFileSymlinkRequest
      description: Represents a request to create a symbolic link.
      examples:
      - link_path: /home/user/newlink
        path: /home/user/dir
    PostMakeDirRequest:
      properties:
        path:
          anyOf:
          - type: string
          - type: 'null'
          title: Path
          description: Source file or directory path
          example: /home/user/dir
        parent:
          type: boolean
          title: Parent
          description: If set to `true` creates all its parent directories if they
            do not already exist
          default: false
          example: true
      type: object
      title: PostMakeDirRequest
      description: Represents a request to create a directory.
      examples:
      - parent: 'true'
        path: /home/user/dir/newdir
    PostMoveRequest:
      properties:
        path:
          anyOf:
          - type: string
          - type: 'null'
          title: Path
          description: Source file or directory path
          example: /home/user/dir
        target_path:
          type: string
          title: Target Path
          description: Target path of the move operation
          example: /home/user/dir/file.new
      type: object
      required:
      - target_path
      title: PostMoveRequest
      description: Represents a request to move a file.
      examples:
      - source_path: /home/user/dir/file.orig
        target_path: /home/user/dir/file.new
    Problem:
      properties:
        type:
          type: string
          format: uri
          title: Type
          description: A URI reference that identifies the problem type.
          default: about:blank
        status:
          type: integer
          maximum: 599.0
          minimum: 100.0
          title: Status
          description: The HTTP status code for this occurrence.
          example: 404
        title:
          anyOf:
          - type: string
          - type: 'null'
          title: Title
          description: Short human-readable summary.
          example: Not Found
        detail:
          anyOf:
          - type: string
          - type: 'null'
          title: Detail
          description: Human-readable explanation.
          example: Descriptive text.
        instance:
          type: string
          title: Instance
          description: A URI reference identifying this occurrence.
          example: http://localhost/api/v1/resource/123
      additionalProperties: true
      type: object
      required:
      - type
      - status
      - instance
      title: Problem
      description: Error structure for REST interface based on RFC 9457, "Problem
        Details for HTTP APIs."
    Project:
      properties:
        id:
          type: string
          title: Id
          description: Unique identifier of the project.
          example: proj-abc123
        name:
          type: string
          title: Name
          description: Human-readable name of the project.
          example: Climate Simulation
        description:
          type: string
          title: Description
          description: Detailed description of the project.
          example: Research project studying atmospheric dynamics.
        user_ids:
          items:
            type: string
          type: array
          title: User Ids
          description: List of user identifiers participating in the project.
          example:
          - user-123
          - user-456
        last_modified:
          type: string
          format: date-time
          title: Last Modified
          description: Timestamp of the last modification of the project.
          example: '2026-02-21T14:30:00Z'
