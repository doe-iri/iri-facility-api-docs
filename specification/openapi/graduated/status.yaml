paths:
  /api/v1/status/resources:
    get:
      tags:
      - status
      summary: Get all resources
      description: Get a list of all resources at this facility. You can optionally
        filter the returned list by specifying attribtes.
      operationId: getResources
      parameters:
      - name: name
        in: query
        required: false
        schema:
          type: string
          minLength: 1
          title: Name
      - name: description
        in: query
        required: false
        schema:
          type: string
          minLength: 1
          title: Description
      - name: group
        in: query
        required: false
        schema:
          type: string
          minLength: 1
          title: Group
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          maximum: 1000
          minimum: 0
          default: 0
          title: Offset
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 1000
          minimum: 0
          default: 100
          title: Limit
      - name: modified_since
        in: query
        required: false
        schema:
          type: string
          format: date-time
          description: Strict ISO8601 datetime. Only valid ISO8601 datetime strings
            are accepted.
          example: '2026-02-21T12:00:00Z'
          title: Modified Since
      - name: resource_type
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/ResourceType'
      - name: current_status
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/Status'
      - name: capability
        in: query
        required: false
        schema:
          type: array
          items:
            $ref: '#/components/schemas/AllocationUnit'
          minItems: 1
          title: Capability
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Resource'
                title: Response Getresources
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
        '401':
          description: Unauthorized
          headers:
            WWW-Authenticate:
              description: Bearer authentication challenge
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
        '404':
