paths:
  /api/v1/facility:
    get:
      tags:
      - facility
      summary: Get Facility
      description: Get facility information
      operationId: getFacility
      parameters:
      - name: modified_since
        in: query
        required: false
        schema:
          type: string
          format: date-time
          description: Strict ISO8601 datetime. Only valid ISO8601 datetime strings
            are accepted.
          example: '2026-02-21T12:00:00Z'
          title: Modified Since
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Facility'
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
        '401':
          description: Unauthorized
          headers:
            WWW-Authenticate:
              description: Bearer authentication challenge
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
        '405':
          description: Method Not Allowed
          headers:
            Allow:
              description: Allowed HTTP methods
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
        '501':
          description: Not Implemented
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
        '504':
          description: Gateway Timeout
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
        '304':
          description: Not Modified
  /api/v1/facility/sites:
    get:
      tags:
      - facility
      summary: List Sites
      description: List sites
      operationId: getSites
      parameters:
      - name: modified_since
        in: query
        required: false
        schema:
          type: string
          format: date-time
          description: Strict ISO8601 datetime. Only valid ISO8601 datetime strings
            are accepted.
          example: '2026-02-21T12:00:00Z'
          title: Modified Since
      - name: name
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            minLength: 1
          - type: 'null'
          title: Name
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          maximum: 1000
          minimum: 0
          default: 0
          title: Offset
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 1000
          minimum: 0
          default: 100
          title: Limit
      - name: short_name
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            minLength: 1
          - type: 'null'
          title: Short Name
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Site'
                title: Response Getsites
        '400':
