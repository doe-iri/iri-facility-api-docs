paths:
  /api/v1/account/capabilities:
    get:
      tags:
      - account
      summary: Get the list of capabilities
      description: Get a list of capabilities at this facility.
      operationId: getCapabilities
      parameters:
      - name: name
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            minLength: 1
          - type: 'null'
          title: Name
      - name: modified_since
        in: query
        required: false
        schema:
          type: string
          format: date-time
          description: Strict ISO8601 datetime. Only valid ISO8601 datetime strings
            are accepted.
          example: '2026-02-21T12:00:00Z'
          title: Modified Since
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          maximum: 1000
          minimum: 0
          default: 0
          title: Offset
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 1000
          minimum: 0
          default: 100
          title: Limit
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Capability'
                title: Response Getcapabilities
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
        '401':
          description: Unauthorized
          headers:
            WWW-Authenticate:
              description: Bearer authentication challenge
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
